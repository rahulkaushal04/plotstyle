# ─────────────────────────────────────────────────────────────────────────────
# Release workflow
#
# Triggered by a version tag push (e.g. `git tag v1.2.3 && git push --tags`).
#
# Jobs
# ────
# validate   Runs the spec validator and import-time benchmark as a final
#            sanity check before anything is published.
#
# publish    Builds the source distribution and wheel, then uploads to PyPI
#            using Trusted Publishing (OIDC — no API token required).
#
# docs       Builds the Sphinx documentation with -W (warnings as errors) and
#            uploads the rendered HTML as a release artifact so each published
#            version has a corresponding browsable docs snapshot.
#
# github-release
#            Creates a GitHub Release for the tag with auto-generated release
#            notes drawn from merged pull requests since the previous release.
#
# Job order: validate + docs → publish → github-release
#
# References
# ──────────
# Trusted Publishing setup:  https://docs.pypi.org/trusted-publishers/
# PyPI publish action:        https://github.com/pypa/gh-action-pypi-publish
# GitHub Release action:      https://github.com/softprops/action-gh-release
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # stable releases:  v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+*"      # pre-releases:     v1.2.3a1, v1.2.3rc1

# Prevent two release workflows running simultaneously for the same tag,
# which could produce duplicate PyPI uploads or conflicting GitHub Releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a running release mid-flight

# Default to read-only token; individual jobs declare only what they need.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Pre-release validation
  #    Runs the spec validator and import-time benchmark so a broken spec or
  #    a slow-importing release is caught before it reaches PyPI.
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package in editable mode
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest

      - name: Validate all journal specs
        run: python scripts/validate_all_specs.py

      - name: Benchmark import time
        run: python scripts/benchmark_import.py --trials 10 --target-ms 1000

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Docs build — Sphinx with warnings-as-errors
  #    Verifies the documentation builds cleanly against the release commit.
  #    The rendered HTML is uploaded as a release artifact so each published
  #    version has a corresponding browsable docs snapshot.
  # ───────────────────────────────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package with docs extras
        # .[docs] installs sphinx, furo, myst-parser, and the package itself
        # so autodoc can import every module it documents.
        run: pip install ".[docs]"

      - name: Build documentation
        # -W turns every Sphinx warning into a build error.
        # -n (nitpick) flags references to undefined labels or missing members.
        # --keep-going reports all errors rather than stopping on the first.
        # READTHEDOCS enables the full intersphinx mapping (matplotlib, numpy,
        # seaborn) so CI catches broken cross-links before they reach RTD.
        env:
          READTHEDOCS: "true"
        run: sphinx-build -W -n --keep-going -b html docs docs/_build/html

      - name: Upload HTML documentation
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 90   # keep for the lifetime of the release cycle

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Build and publish to PyPI
  #    Uses PyPA Trusted Publishing (OIDC) — no API token needed.
  #    Requires a Trusted Publisher entry configured on pypi.org for this
  #    repository / workflow file / environment.
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate, docs]
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/project/plotstyle/
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build frontend
        run: pip install build

      - name: Build source distribution and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5

      - name: Verify distribution contents
        run: |
          pip install twine
          twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # generate SLSA provenance attestation (best practice for open source)
        # No credentials needed — OIDC token is provided automatically via
        # the id-token: write permission and the PyPI Trusted Publisher config.

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Create GitHub Release
  #    Runs only after a successful PyPI publish so the release notes are
  #    never created for a failed upload.
  # ───────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write   # required to create and upload a GitHub Release
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          files: dist/*
