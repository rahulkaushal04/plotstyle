[metadata]
name = "CJK Simplified"
category = "script"
description = "Font configuration for Simplified Chinese labels (GB2312/Unicode)."

[rcparams]
"font.family" = ["SimHei", "Microsoft YaHei", "Noto Sans CJK SC", "WenQuanYi Micro Hei"]
"axes.unicode_minus" = false

[script]
latex_preamble = [
    "\\usepackage{xeCJK}",
    "\\setCJKmainfont{SimHei}",
]

[requires]
fonts = ["SimHei", "Microsoft YaHei", "Noto Sans CJK SC", "WenQuanYi Micro Hei"]
