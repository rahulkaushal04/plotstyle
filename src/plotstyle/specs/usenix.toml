[metadata]
name = "USENIX"
publisher = "USENIX Association"
source_url = "https://www.usenix.org/conferences/author-resources/paper-templates"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 88.0
double_column_mm = 178.0
max_height_mm = 229.0

[typography]
font_family = ["Times New Roman", "Times", "Nimbus Roman"]
font_fallback = "serif"
min_font_pt = 7.5
max_font_pt = 9.0
panel_label_pt = 8.0
panel_label_weight = "bold"
panel_label_case = "lower"

[export]
preferred_formats = ["pdf"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
colorblind_required = false
grayscale_required = false

[line]
min_weight_pt = 0.5
