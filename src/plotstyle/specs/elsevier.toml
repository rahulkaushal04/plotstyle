[metadata]
name = "Elsevier"
publisher = "Elsevier"
source_url = "https://www.elsevier.com/about/policies-and-standards/author/artwork-and-media-instructions/artwork-sizing"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 90.0
double_column_mm = 190.0
max_height_mm = 240.0

[typography]
font_family = ["Arial", "Times New Roman"]
font_fallback = "serif"
min_font_pt = 8.0
max_font_pt = 12.0

[export]
preferred_formats = ["tiff", "eps", "pdf"]
min_dpi = 300
font_embedding = true
editable_text = false

[color]
avoid_combinations = []
colorblind_required = false
grayscale_required = false

[line]
# Elsevier artwork FAQs and sizing guides recommend adequate line weights but do not state a single numeric minimum line width across all journals.
