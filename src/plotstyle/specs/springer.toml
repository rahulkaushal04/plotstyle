[metadata]
name = "Springer"
publisher = "Springer"
source_url = "https://www.springer.com/gp/authors-editors/journal-author/journal-author-helpdesk/preparation/1276"
last_verified = "2026-04-02"
verified_by = "plotstyle"

[dimensions]
single_column_mm = 84.0
double_column_mm = 174.0
max_height_mm = 234.0

[typography]
font_family = ["Helvetica", "Arial"]
font_fallback = "sans-serif"
min_font_pt = 6.0
max_font_pt = 9.0
panel_label_pt = 8.0
panel_label_weight = "bold"
panel_label_case = "lower"

[export]
preferred_formats = ["tiff", "eps", "pdf"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = [["red", "green"]]
colorblind_required = true
grayscale_required = false

[line]
min_weight_pt = 0.3
