[metadata]
name = "Springer"
publisher = "Springer Nature"
source_url = "https://support.springernature.com/en/support/solutions/articles/6000083109-artwork-submission-instructions"
last_verified = "2026-04-30"

[dimensions]
# Springer Nature’s generic artwork instructions defer specific figure widths and heights to journal-level guidelines; no single standard single/double-column dimensions are imposed across all Springer journals.

[typography]
# No global Springer-wide prescriptions for specific in-figure font families or sizes are given beyond the expectation of legible, consistent labeling.

[export]
preferred_formats = ["tiff", "eps", "pdf"]
min_dpi = 300
font_embedding = true
editable_text = false

[color]
avoid_combinations = []
colorblind_required = false
grayscale_required = false

[line]
# Springer and Palgrave artwork guidelines specify higher resolutions for line art (often 600–1200 dpi) but do not define a single minimum line weight in points across all titles.
