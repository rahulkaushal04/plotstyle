[metadata]
name = "ACM"
publisher = "Association for Computing Machinery"
source_url = "https://www.acm.org/publications/proceedings-template"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 84.5
double_column_mm = 180.0
max_height_mm = 235.0

[typography]
font_family = ["Linux Libertine", "Times New Roman", "Times"]
font_fallback = "serif"
min_font_pt = 7.0
max_font_pt = 9.0
panel_label_pt = 7.0
panel_label_weight = "bold"
panel_label_case = "lower"

[export]
preferred_formats = ["pdf", "eps"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
colorblind_required = false
grayscale_required = false

[line]
min_weight_pt = 0.5
