[metadata]
name = "IEEE Transactions"
publisher = "IEEE"
source_url = "https://proceedingsoftheieee.ieee.org/resources/guidelines-for-figures-and-tables/"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 88.9
double_column_mm = 182.0
max_height_mm = 216.0

[typography]
font_family = ["Times New Roman", "Helvetica", "Arial"]
font_fallback = "serif"
min_font_pt = 9.0
max_font_pt = 10.0

[export]
preferred_formats = ["tiff", "eps", "pdf", "png"]
min_dpi = 300
font_embedding = true
editable_text = false

[color]
avoid_combinations = [["red", "green"]]
colorblind_required = true
grayscale_required = false

[line]
# IEEE figure guidelines emphasize sufficient line contrast and resolution but do not mandate a single global numeric minimum line width across all periodicals.
