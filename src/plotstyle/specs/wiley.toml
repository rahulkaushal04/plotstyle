[metadata]
name = "Wiley"
publisher = "Wiley"
source_url = "https://onlinelibrary.wiley.com/page/journal/16136829/homepage/graphics-faq"
last_verified = "2026-04-02"
verified_by = "plotstyle"

[dimensions]
single_column_mm = 85.0
double_column_mm = 178.0
max_height_mm = 230.0

[typography]
font_family = ["Helvetica", "Arial"]
font_fallback = "sans-serif"
min_font_pt = 8.0
max_font_pt = 12.0
panel_label_pt = 12.0
panel_label_weight = "normal"
panel_label_case = "lower"

[export]
preferred_formats = ["tiff", "eps", "pdf"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = [["red", "green"]]
colorblind_required = true
grayscale_required = false

[line]
min_weight_pt = 0.5
