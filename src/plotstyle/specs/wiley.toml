[metadata]
name = "Wiley"
publisher = "Wiley"
source_url = "https://onlinelibrary.wiley.com/pb-assets/assets/29941806/AG/basic-figure-requirements-1737125359497.pdf"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 80.0
double_column_mm = 180.0

[typography]
# Wiley’s generic figure guidelines stress legibility of all labels at 80 mm width but do not prescribe explicit font families or point-size bands for all journals.

[export]
preferred_formats = ["tiff", "eps"]
min_dpi = 300
font_embedding = true
editable_text = false

[color]
avoid_combinations = []
colorblind_required = false
grayscale_required = false

[line]
# Line-art resolution requirements (>600 dpi) are specified, but not a universal numeric minimum stroke width in points.
