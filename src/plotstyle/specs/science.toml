[metadata]
name = "Science"
publisher = "AAAS"
source_url = "https://www.science.org/content/page/instructions-preparing-initial-manuscript"
last_verified = "2026-04-02"
verified_by = "plotstyle"

[dimensions]
single_column_mm = 57.0
double_column_mm = 121.0
max_height_mm = 230.0

[typography]
font_family = ["Helvetica", "Myriad Pro", "Arial"]
font_fallback = "sans-serif"
min_font_pt = 5.0
max_font_pt = 9.0
panel_label_pt = 9.0
panel_label_weight = "bold"
panel_label_case = "upper"

[export]
preferred_formats = ["tiff", "pdf", "eps"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = [["red", "green"]]
colorblind_required = true
grayscale_required = false

[line]
min_weight_pt = 0.28
