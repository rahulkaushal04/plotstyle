[metadata]
name = "Science"
publisher = "AAAS"
source_url = "https://spj.science.org/pb-assets/SPJ/CustomPages/Misc/SPJ_Figure_Preparation_Guide-1691522222.pdf"
last_verified = "2026-04-22"
verified_by = "rahulkaushal04"

[dimensions]
single_column_mm = 86.4
double_column_mm = 177.8

[typography]
font_family = ["Minion Pro", "Benton Sans Condensed"]
font_fallback = "serif"
min_font_pt = 7.5
max_font_pt = 10.0

[export]
preferred_formats = ["ai", "eps", "pdf", "tiff"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = [["red", "green"]]
colorblind_required = true
grayscale_required = false

[line]
# Science’s figure guide emphasizes avoiding overly thin lines and ensuring clarity at print size, but it does not define a single numeric minimum line width.
