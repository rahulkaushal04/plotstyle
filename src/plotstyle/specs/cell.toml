[metadata]
name = "Cell"
publisher = "Cell Press"
source_url = "https://www.cell.com/figure-guidelines"
last_verified = "2026-04-22"
verified_by = "rahulkaushal04"

[dimensions]
# NOTE: Cell-specific numeric column widths and max height could not be confirmed from publicly accessible Cell Press figure guidelines; values below reflect prior configuration and should be treated as advisory only, not authoritative.
single_column_mm = 85.0
double_column_mm = 174.0
max_height_mm = 240.0

[typography]
# NOTE: Official Cell Press figure guidelines accessible via the web do not currently publish specific numeric font-size bands for in-figure text; values here are advisory only.
font_family = ["Helvetica", "Arial"]
font_fallback = "sans-serif"
min_font_pt = 6.0
max_font_pt = 8.0

[export]
# Cell Press digital image/graphical-abstract guidance confirms use of TIFF/PDF/JPEG at 300 dpi, but does not expose full, figure-specific requirements in a central public document; these formats and DPI are consistent with those materials and common Cell Press practice.
preferred_formats = ["tiff", "pdf", "jpeg"]
min_dpi = 300
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = []
colorblind_required = false
grayscale_required = false

[line]
min_weight_pt = 0.5
