[metadata]
name = "Cell"
publisher = "Cell Press"
source_url = "https://www.cell.com/figureguidelines"
last_verified = "2026-04-30"

[dimensions]
single_column_mm = 85.0
double_column_mm = 174.0
max_height_mm = 240.0

[typography]
font_family = ["Helvetica", "Arial"]
font_fallback = "sans-serif"
min_font_pt = 7.0
max_font_pt = 8.0

[export]
preferred_formats = ["tiff", "pdf", "jpeg"]
min_dpi = 300
# Color figures: 300 dpi; grayscale/b&w figures: 500 dpi; line art: 1000 dpi.
color_space = "RGB"
font_embedding = true
editable_text = false

[color]
avoid_combinations = []
colorblind_required = false
grayscale_required = false

[line]
min_weight_pt = 0.5
